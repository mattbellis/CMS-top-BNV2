# MC samples for the ttbar semileptonic analysis
# Cross sections in pb, taken from CMS TWiki / GenXSecAnalyzer
# https://twiki.cern.ch/twiki/bin/view/CMS/SummaryTable1G25ns
#
# DAS paths shown here are UL18 NanoAODv9 examples.
# Duplicate this block adjusting the era tag for UL16/UL16APV/UL17/UL18
# or Run3 equivalents.
#
# Structure expected by dataset_diagnostics.py and the pocket-coffea
# Configurator: each top-level key is the "sample name" used throughout
# the analysis.

# ── Top quark pairs ────────────────────────────────────────────────────────────

TTToSemiLeptonic:
  das_path: "/TTToSemiLeptonic_TuneCP5_13TeV-powheg-pythia8/RunIISummer20UL18NanoAODv9-106X_upgrade2018_realistic_v16_L1v1-v1/NANOAODSIM"
  cross_section: 365.34      # pb  (semi-leptonic BR applied)
  n_effective_events: -1     # filled automatically by dataset_diagnostics.py
  generator: powheg+pythia8
  process_group: ttbar
  era: UL18
  is_signal: true

